name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install libclang + clang (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y llvm-dev libclang-dev clang
      - name: Install LLVM (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install llvm
          echo "LIBCLANG_PATH=$(brew --prefix llvm)/lib" >> "$GITHUB_ENV"
      - name: Install LLVM (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install llvm -y
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        if: runner.os == 'Linux'
        run: cargo fmt --all -- --check
      - name: Build (default features, locked)
        run: cargo build --locked --verbose
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Test (default features)
        run: cargo test --verbose
      - name: Build --no-default-features
        run: cargo build --no-default-features --verbose
      # Excludes `ffmpeg`, which links external ffmpeg 8.x shared+dev libraries not available on the
      # runners (verified locally instead; see the `ffmpeg` feature in Cargo.toml).
      - name: Build (all in-tree features)
        run: cargo build --features diarization,streaming,download,raw-api --verbose

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install libclang + clang
        run: sudo apt-get update && sudo apt-get install -y llvm-dev libclang-dev clang
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Coverage (excludes ignored model-gated tests)
        run: cargo llvm-cov --summary-only

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit
      - name: Audit dependencies
        run: cargo audit

  cargo-deny:
    name: cargo-deny (licenses, bans, advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  msrv:
    name: msrv (1.86)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install libclang + clang
        run: sudo apt-get update && sudo apt-get install -y llvm-dev libclang-dev clang
      - uses: dtolnay/rust-toolchain@1.86
      - uses: Swatinem/rust-cache@v2
      - name: Build (MSRV 1.86, locked)
        run: cargo build --locked --verbose

  ffmpeg:
    name: ffmpeg feature (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install libclang + clang
        run: sudo apt-get update && sudo apt-get install -y llvm-dev libclang-dev clang
      - name: Fetch ffmpeg 8.1 shared+dev libraries
        run: |
          curl -L -o /tmp/ffmpeg.tar.xz \
            https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-n8.1-latest-linux64-gpl-shared-8.1.tar.xz
          mkdir -p "$HOME/ffmpeg"
          tar -xf /tmp/ffmpeg.tar.xz -C "$HOME/ffmpeg" --strip-components=1
          echo "FFMPEG_DIR=$HOME/ffmpeg" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$HOME/ffmpeg/lib" >> "$GITHUB_ENV"
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Build --features ffmpeg
        run: cargo build --features ffmpeg --verbose
      - name: Clippy --features ffmpeg
        run: cargo clippy --features ffmpeg -- -D warnings
      - name: Test --features ffmpeg (exercises the decode path)
        run: cargo test --features ffmpeg --verbose

  model-gated:
    name: model-gated ASR (tiny.en)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install libclang + clang
        run: sudo apt-get update && sudo apt-get install -y llvm-dev libclang-dev clang
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Cache tiny.en GGML model
        id: model-cache
        uses: actions/cache@v4
        with:
          path: models/ggml-tiny.en.bin
          key: ggml-tiny-en-bin-v1
      - name: Download tiny.en model (cache miss only)
        if: steps.model-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p models
          curl -L --fail -o models/ggml-tiny.en.bin \
            https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-tiny.en.bin
      - name: Run model-gated ASR tests (real-audio regression)
        run: cargo test --locked -- --ignored
