# cargo-deny — supply-chain policy gate (advisories, licenses, bans, sources).
# Run locally with: cargo deny check
#
# cargo-deny evaluates the whole Cargo.lock graph, so optional-dependency licenses (e.g. the
# opt-in `ffmpeg` feature's ffmpeg-next/ffmpeg-sys-next, licensed WTFPL) are in scope even
# when the feature is off. The allowlist below covers every SPDX expression in the tree; all
# are permissive / FSF-Free.

[advisories]
version = 2
yanked = "deny"
ignore = []

[licenses]
version = 2
confidence-threshold = 0.9
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "ISC",
    "BSD-3-Clause",
    "Unicode-3.0",
    "CDLA-Permissive-2.0",
    "WTFPL",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
