# cargo-deny — supply-chain policy gate (advisories, licenses, bans, sources).
# Checks the DEFAULT feature set; the opt-in `ffmpeg` feature pulls WTFPL/GPL-adjacent
# native deps that a consumer explicitly accepts when they enable it, so they are out of
# scope for the default gate. Run locally with: cargo deny check
#
# The license allowlist is derived from `cargo metadata` over the default features — every
# dependency's SPDX expression is satisfied by a permissive license in `allow` below.

[advisories]
version = 2
yanked = "deny"
ignore = []

[licenses]
version = 2
confidence-threshold = 0.9
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "ISC",
    "BSD-3-Clause",
    "Unicode-3.0",
    "CDLA-Permissive-2.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
